<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BROTHERHOOD</title>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }

        #landing-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            transition: opacity 1.5s ease;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        .title {
            color: #333;
            letter-spacing: 10px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        #enter-btn {
            background: transparent;
            border: 1px solid #222;
            color: #444;
            padding: 10px 30px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.5s;
            font-size: 1rem;
        }

        #enter-btn:hover {
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .hidden { display: none; }

        #main-video {
            width: 100vw; 
            height: 100vh;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <div id="landing-screen">
        <div class="content">
            <h1 class="title">Only Brother</h1>
            <button id="enter-btn">ACCESS</button>
        </div>
    </div>

    <video id="main-video" class="hidden" playsinline>
        <source src="assets/video/your-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const btn = document.getElementById('enter-btn');
        const landing = document.getElementById('landing-screen');
        const video = document.getElementById('main-video');

        btn.addEventListener('click', () => {
            landing.style.opacity = '0';
            
            setTimeout(() => {
                landing.style.display = 'none';
                video.classList.remove('hidden');
                video.play(); 
                video.volume = 0;
                let fadeAudio = setInterval(() => {
                    if (video.volume < 0.9) {
                        video.volume += 0.1;
                    } else {
                        video.volume = 1;
                        clearInterval(fadeAudio);
                    }
                }, 200);
            }, 1500);
        });
    </script>
</body>
</html>
