<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BROTHERHOOD</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
        }

        /* ===============================
           BACKGROUND
        ================================ */
        body {
            background: radial-gradient(circle at center, #111 0%, #050505 55%, #000 100%);
        }

        /* ===============================
           LANDING SCREEN
        ================================ */
        #landing-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 2s;
            padding: 20px; /* يمنع المحتوى من الالتصاق بحواف الهاتف */
        }

        /* Glow */
        #landing-screen::before {
            content: "";
            position: absolute;
            width: 80vmin; /* حجم يتكيف مع الشاشة */
            height: 80vmin;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,.08), transparent 70%);
            animation: pulse 6s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(.8); opacity: .2; }
            50% { transform: scale(1.1); opacity: .5; }
            100% { transform: scale(.8); opacity: .2; }
        }

        .content {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: clamp(30px, 6vw, 60px); /* حشوة ديناميكية */
            border: 1px solid rgba(255,255,255,.08);
            background: rgba(255,255,255,.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* مهم للآيفون */
            border-radius: 18px;
            box-shadow: 0 0 80px rgba(255,255,255,.04), inset 0 0 40px rgba(255,255,255,.03);
        }

        /* ==================================
           TITLE
        ================================== */
        .title {
            font-size: clamp(30px, 8vw, 65px); /* يتصاغر تلقائياً في الهاتف */
            font-weight: 800;
            color: white;
            letter-spacing: clamp(5px, 2vw, 15px); /* مسافة ديناميكية بين الأحرف */
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,255,255,.2), 0 0 35px rgba(255,255,255,.08);
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 8px rgba(255,255,255,.15); }
            to { text-shadow: 0 0 18px rgba(255,255,255,.4), 0 0 40px rgba(255,255,255,.15); }
        }

        .subtitle {
            color: #888;
            font-size: clamp(10px, 3vw, 14px);
            letter-spacing: clamp(3px, 1.5vw, 10px);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        /* ==================================
           BUTTON
        ================================== */
        #enter-btn {
            width: 100%;
            max-width: 240px;
            height: 60px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,.25);
            background: rgba(255,255,255,.05);
            color: white;
            font-size: 16px;
            letter-spacing: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: .4s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #enter-btn:hover {
            transform: translateY(-4px) scale(1.05);
            background: white;
            color: black;
            box-shadow: 0 0 35px rgba(255,255,255,.5);
        }

        #enter-btn:active {
            transform: scale(.95);
        }

        /* ==================================
           VIDEO
        ================================== */
        .hidden {
            display: none;
        }

        #main-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background: #000;
        }

        /* ==================================
           Particles
        ================================== */
        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: .2;
            animation: float linear infinite;
            z-index: 1; /* إبقاء الجزيئات خلف الواجهة */
        }

        @keyframes float {
            from { transform: translateY(100vh); }
            to { transform: translateY(-120vh); }
        }
    </style>
</head>
<body>

    <div id="landing-screen">
        <div class="content">
            <h1 class="title">THE BROTHERHOOD</h1>
            <div class="subtitle">WELCOME TO THE INNER CIRCLE</div>
            <button id="enter-btn">ACCESS</button>
        </div>
    </div>

    <video id="main-video" class="hidden" playsinline>
        <source src="Yuyu.mov" type="video/quicktime">
    </video>

    <script>
        const btn = document.getElementById("enter-btn");
        const landing = document.getElementById("landing-screen");
        const video = document.getElementById("main-video");

        /* Floating Particles */
        for (let i = 0; i < 60; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            let s = Math.random() * 3 + 1;
            p.style.width = s + "px";
            p.style.height = s + "px";
            p.style.left = Math.random() * 100 + "%";
            p.style.animationDuration = (Math.random() * 10 + 8) + "s";
            p.style.animationDelay = (Math.random() * 8) + "s";
            document.body.appendChild(p);
        }

        /* Enter Button Logic */
        btn.onclick = () => {
            landing.style.opacity = "0";

            setTimeout(() => {
                landing.style.display = "none";
                video.classList.remove("hidden");
                video.volume = 0;
                video.play();

                let fade = setInterval(() => {
                    if (video.volume < 0.95) {
                        video.volume += 0.05;
                    } else {
                        video.volume = 1;
                        clearInterval(fade);
                    }
                }, 150);
            }, 1800);
        };
    </script>
</body>
</html>
