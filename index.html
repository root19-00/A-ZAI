<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😊</title>
<style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #ffd700, #fff2a6);
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: white;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #ffd700;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: #ffd700;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            opacity: 0.95;
        }

        #message {
            display: none;
        }

        .signature {
            margin-top: 25px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container" id="formContainer">

    <h1>😊</h1>

    <p>
        Wat bijzonder dat u deze glimlach hebt ontdekt!
    </p>

    <p>
        Niet iedereen komt deze pagina tegen.
        Sterker nog, deze glimlach was eigenlijk voor u bedoeld.

    </p>

    <p>
        Laat hieronder uw gegevens achter,
        zodat uw verrassing de juiste bestemming bereikt.
    </p>

    <input type="text" id="name" placeholder="Volledige naam *">

<input type="text" id="street" placeholder="Straatnaam *">

<div style="display:flex; gap:10px;">
    <input type="text" id="postcode" placeholder="Postcode *">
    <input type="text" id="houseNumber" placeholder="Huisnummer *">
</div>
<input type="text" id="city" placeholder="Woonplaats *">
    <button onclick="submitForm()">Verzenden</button>

</div>

<div class="container" id="message"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXIty5TGVNu37oLDYtWFjgA-pLcnqgEmU",
            authDomain: "nl-team.firebaseapp.com",
            projectId: "nl-team",
            databaseURL: "https://nl-team-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "nl-team.firebasestorage.app",
            messagingSenderId: "165944460560",
            appId: "1:165944460560:web:7435e881c6823413d3d195"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.submitForm = function () {
const name = document.getElementById("name").value.trim();            
const street = document.getElementById("street").value.trim();
const postcode = document.getElementById("postcode").value.trim();
const houseNumber = document.getElementById("houseNumber").value.trim();
const city = document.getElementById("city").value.trim();

if (!name || !street || !postcode || !houseNumber || !city) {
    alert("Vul alle verplichte velden in.");
    return;
}

            push(ref(db, "submissions/"), {
    name,
    street,
    postcode,
    houseNumber,
    city,
    timestamp: new Date().toISOString()
})
            .then(() => {
                document.getElementById("formContainer").style.display = "none";

                document.getElementById("message").innerHTML = `
                    <h2>Gefeliciteerd, ${name}!</h2>

<p>
    Uw glimlach is succesvol geregistreerd.
</p>

<p>
    Hartelijk dank voor het invullen van uw gegevens.
</p>

<p>
    Uw verrassing is onderweg.
</p>

<p>
    Vergeet niet uw glimlach te bewaren 😉
</p>

<p class="signature">
    Met vriendelijke groet,<br>
    De Geest
</p>
`;
                document.getElementById("message").style.display = "block";
            })
            .catch(error => {
                alert("Er is een fout opgetreden: " + error.message);
            });
        };
    </script>

</body>
</html>
